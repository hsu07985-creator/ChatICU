name: ChatICU CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_extended_e2e:
        description: "Run extended Playwright journeys"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 20 * * 0"

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies (locked)
        run: pip install -r requirements.lock

      - name: Validate datamock schema (JSON mode)
        env:
          DATA_SOURCE_MODE: "json"
          DATAMOCK_DIR: "${{ github.workspace }}/datamock"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m seeds.validate_datamock

      - name: Run contract tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m pytest tests/test_api/test_contract.py -q

      - name: Run backend integration tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m pytest tests/test_api -q

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies
        run: |
          pip install -r requirements.lock
          pip install flake8==7.3.0

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Display bandit results
        run: bandit -r app/ -c pyproject.toml --severity-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  migration-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chaticu_migration
          POSTGRES_USER: chaticu
          POSTGRES_PASSWORD: chaticu_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chaticu -d chaticu_migration"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Verify Alembic migrations apply cleanly
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_migration"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m alembic upgrade head

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (if configured)
        run: |
          if [ -f tsconfig.json ] && npm ls typescript >/dev/null 2>&1; then
            npx tsc --noEmit
          else
            echo "Skipping TypeScript check (typescript/tsconfig not configured)"
          fi

      - name: Build frontend
        run: npm run build

  static-integration-guards:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
          fi

      - name: Block except-pass in production code
        run: |
          set -euo pipefail
          if rg -n --glob '*.py' --glob '*.ts' --glob '*.tsx' --glob '*.js' --glob '*.jsx' 'except\s+[^:]+:\s*pass|except\s*:\s*pass' backend src e2e; then
            echo "[INTG][CI] forbidden except...pass found"
            exit 1
          fi

      - name: Block dangerous CORS origin (0.0.0.0)
        run: |
          set -euo pipefail
          if rg -n --glob '*.py' --glob '*.env*' --glob '*.yml' --glob '*.yaml' 'CORS_ORIGINS.*0\.0\.0\.0|allow_origins.*0\.0\.0\.0' backend .; then
            echo "[INTG][CI] dangerous CORS origin 0.0.0.0 detected"
            exit 1
          fi

      - name: Block suspicious secret patterns in tracked files
        run: |
          set -euo pipefail
          git ls-files > /tmp/tracked_files.txt
          if xargs rg -n -I --no-messages '(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{10,}|AIza[0-9A-Za-z\-_]{35}|sk-[A-Za-z0-9]{20,})' < /tmp/tracked_files.txt; then
            echo "[INTG][CI] suspicious secret pattern detected in tracked files"
            exit 1
          fi

      - name: Block risky API payload non-null assertions
        run: |
          set -euo pipefail
          if rg -n --glob '*.ts' --glob '*.tsx' 'response\.data\.data!' src/lib src/pages; then
            echo "[INTG][CI] risky non-null assertion detected (response.data.data!)"
            exit 1
          fi

      - name: Check for orphaned imports in src/imports/
        run: |
          set -euo pipefail
          orphans=0
          for f in src/imports/*.tsx src/imports/*.ts; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .tsx)
            base=$(basename "$base" .ts)
            if ! grep -r "$base" src/pages/ src/components/ src/lib/ \
                 --include="*.tsx" --include="*.ts" -q; then
              echo "::error::ORPHAN: $f"
              orphans=$((orphans + 1))
            fi
          done
          [ "$orphans" -eq 0 ] || exit 1

      - name: No markdown in src/
        run: |
          set -euo pipefail
          md_files=$(find src/ -name "*.md" -not -path "*/node_modules/*" 2>/dev/null || true)
          if [ -n "$md_files" ]; then
            echo "::error::Markdown files found in src/ — move to docs/"
            echo "$md_files"
            exit 1
          fi

      - name: No archived files tracked
        run: |
          tracked=$(git ls-files _archive_candidates/ 2>/dev/null || true)
          if [ -n "$tracked" ]; then
            echo "::error::_archive_candidates/ should be in .gitignore"
            echo "$tracked"
            exit 1
          fi

  e2e-critical-journey:
    runs-on: ubuntu-latest
    needs: [backend-test, migration-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chaticu_e2e
          POSTGRES_USER: chaticu
          POSTGRES_PASSWORD: chaticu_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chaticu -d chaticu_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install backend dependencies
        run: pip install -r backend/requirements.lock

      - name: Apply migrations and seed data
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_e2e"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: |
          cd backend
          python -m alembic upgrade head
          python -m seeds.seed_data

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend service
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_e2e"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: '["http://127.0.0.1:4173","http://localhost:4173","http://127.0.0.1:5173","http://localhost:5173","http://127.0.0.1:3000","http://localhost:3000"]'
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/chaticu-backend.log 2>&1 &
          echo $! > /tmp/chaticu-backend.pid

      - name: Start frontend service
        env:
          VITE_API_URL: "http://127.0.0.1:8000"
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/chaticu-frontend.log 2>&1 &
          echo $! > /tmp/chaticu-frontend.pid

      - name: Wait for backend and frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Backend is ready."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start in time."
              cat /tmp/chaticu-backend.log || true
              exit 1
            fi
            sleep 2
          done

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              echo "Frontend is ready."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Frontend failed to start in time."
              cat /tmp/chaticu-frontend.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run critical E2E journey
        env:
          E2E_BASE_URL: "http://127.0.0.1:4173"
          E2E_USERNAME: "admin"
          E2E_PASSWORD: "CITestPassword123!"
        run: npm run test:e2e -- --project=chromium --grep "@critical"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-playwright-artifacts
          if-no-files-found: ignore
          path: |
            output/playwright
            /tmp/chaticu-backend.log
            /tmp/chaticu-frontend.log

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "===== BACKEND LOG ====="
          cat /tmp/chaticu-backend.log || true
          echo "===== FRONTEND LOG ====="
          cat /tmp/chaticu-frontend.log || true

  e2e-extended-journeys:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_extended_e2e == 'true')
    runs-on: ubuntu-latest
    needs: [backend-test, migration-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chaticu_e2e_extended
          POSTGRES_USER: chaticu
          POSTGRES_PASSWORD: chaticu_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chaticu -d chaticu_e2e_extended"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install backend dependencies
        run: pip install -r backend/requirements.lock

      - name: Apply migrations and seed data
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_e2e_extended"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: |
          cd backend
          python -m alembic upgrade head
          python -m seeds.seed_data

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend service
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_e2e_extended"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: '["http://127.0.0.1:4173","http://localhost:4173","http://127.0.0.1:5173","http://localhost:5173","http://127.0.0.1:3000","http://localhost:3000"]'
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/chaticu-backend-extended.log 2>&1 &
          echo $! > /tmp/chaticu-backend-extended.pid

      - name: Start frontend service
        env:
          VITE_API_URL: "http://127.0.0.1:8000"
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/chaticu-frontend-extended.log 2>&1 &
          echo $! > /tmp/chaticu-frontend-extended.pid

      - name: Wait for backend and frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Backend is ready."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start in time."
              cat /tmp/chaticu-backend-extended.log || true
              exit 1
            fi
            sleep 2
          done

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              echo "Frontend is ready."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Frontend failed to start in time."
              cat /tmp/chaticu-frontend-extended.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run extended E2E journeys
        env:
          E2E_BASE_URL: "http://127.0.0.1:4173"
          E2E_USERNAME: "admin"
          E2E_PASSWORD: "CITestPassword123!"
        run: npm run test:e2e -- --project=chromium --grep "@t27-extended"

      - name: Upload extended E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-playwright-extended-artifacts
          if-no-files-found: ignore
          path: |
            output/playwright
            /tmp/chaticu-backend-extended.log
            /tmp/chaticu-frontend-extended.log

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "===== BACKEND EXTENDED LOG ====="
          cat /tmp/chaticu-backend-extended.log || true
          echo "===== FRONTEND EXTENDED LOG ====="
          cat /tmp/chaticu-frontend-extended.log || true

  dast-scan:
    runs-on: ubuntu-latest
    needs: [backend-test, migration-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chaticu_dast
          POSTGRES_USER: chaticu
          POSTGRES_PASSWORD: chaticu_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chaticu -d chaticu_dast"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install backend dependencies
        run: pip install -r backend/requirements.lock

      - name: Apply migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_dast"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Start backend service for DAST
        env:
          DATABASE_URL: "postgresql+asyncpg://chaticu:chaticu_password@localhost:5432/chaticu_dast"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/chaticu-dast-backend.log 2>&1 &
          echo $! > /tmp/chaticu-dast-backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "Backend is ready for DAST."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start in time."
              cat /tmp/chaticu-dast-backend.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p output/dast
          chmod 777 output/dast
          docker run --rm --network host -v "${PWD}/output/dast:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8000 \
            -m 3 \
            -I \
            -J zap-report.json \
            -r zap-report.html \
            -w zap-warnings.md
          ls -lah output/dast

      - name: Enforce DAST gate (block on High)
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          candidates = [
              Path("output/dast/zap-report.json"),
              Path("output/dast/report_json.json"),
          ]
          report_path = next((p for p in candidates if p.exists()), None)
          if report_path is None:
              print("DAST report not found under output/dast.")
              for p in sorted(Path("output/dast").glob("*")):
                  print(f" - {p}")
              sys.exit(1)

          with report_path.open("r", encoding="utf-8") as f:
              data = json.load(f)

          high_count = 0
          medium_or_higher = 0
          for site in data.get("site", []):
              for alert in site.get("alerts", []):
                  risk = int(alert.get("riskcode", "0"))
                  count = int(alert.get("count", "0"))
                  if risk >= 2:
                      medium_or_higher += count
                  if risk >= 3:
                      high_count += count

          print(f"DAST report file: {report_path}")
          print(f"DAST summary: high={high_count}, medium_or_higher={medium_or_higher}")
          if high_count > 0:
              print("High-risk DAST findings detected. Blocking pipeline.")
              sys.exit(1)
          PY

      - name: Generate DAST gate summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          candidates = [
              Path("output/dast/zap-report.json"),
              Path("output/dast/report_json.json"),
          ]
          report_path = next((p for p in candidates if p.exists()), None)
          summary_path = Path("output/dast/dast-gate-summary.md")

          if report_path is None:
              summary_path.write_text(
                  "# DAST Gate Summary\n\n- Report file: not found\n- Result: failed to parse report\n",
                  encoding="utf-8",
              )
          else:
              data = json.loads(report_path.read_text(encoding="utf-8"))
              high_count = 0
              medium_or_higher = 0
              total_alerts = 0
              for site in data.get("site", []):
                  for alert in site.get("alerts", []):
                      risk = int(alert.get("riskcode", "0"))
                      count = int(alert.get("count", "0"))
                      total_alerts += count
                      if risk >= 2:
                          medium_or_higher += count
                      if risk >= 3:
                          high_count += count
              result = "BLOCK" if high_count > 0 else "PASS"
              summary_path.write_text(
                  "\n".join(
                      [
                          "# DAST Gate Summary",
                          "",
                          f"- Report file: `{report_path}`",
                          f"- Total alerts: {total_alerts}",
                          f"- Medium or higher: {medium_or_higher}",
                          f"- High: {high_count}",
                          f"- Gate result: {result} (policy: High > 0 blocks)",
                      ]
                  )
                  + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dast-zap-report
          path: |
            output/dast
            /tmp/chaticu-dast-backend.log

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/chaticu-dast-backend.log || true

  reproducibility-report:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, security-scan, migration-check, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate reproducibility report
        env:
          CI_RUN_ID: ${{ github.run_id }}
          CI_RUN_NUMBER: ${{ github.run_number }}
          CI_SHA: ${{ github.sha }}
          CI_REF: ${{ github.ref_name }}
        run: |
          mkdir -p output/reproducibility
          PYTHON_VERSION="$(python --version 2>&1)"
          NODE_VERSION="$(node --version)"
          NPM_VERSION="$(npm --version)"
          DOCKER_VERSION="$(docker --version)"
          REQ_LOCK_SHA="$(sha256sum backend/requirements.lock | awk '{print $1}')"
          NPM_LOCK_SHA="$(sha256sum package-lock.json | awk '{print $1}')"

          cat > output/reproducibility/reproducibility-report.md <<EOF
          # Reproducibility Report

          ## Run Metadata
          - Date (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          - CI Run ID: ${CI_RUN_ID}
          - CI Run Number: ${CI_RUN_NUMBER}
          - Commit SHA: ${CI_SHA}
          - Branch: ${CI_REF}

          ## Environment Versions
          - ${PYTHON_VERSION}
          - Node.js ${NODE_VERSION}
          - npm ${NPM_VERSION}
          - ${DOCKER_VERSION}

          ## Dependency Locks
          - backend/requirements.lock SHA256: ${REQ_LOCK_SHA}
          - package-lock.json SHA256: ${NPM_LOCK_SHA}

          ## Verification Matrix
          - backend-test: passed (required by needs)
          - backend-lint: passed (required by needs)
          - security-scan: passed (required by needs)
          - migration-check: passed (required by needs)
          - frontend-build: passed (required by needs)
          EOF

      - name: Upload reproducibility artifact
        uses: actions/upload-artifact@v7
        with:
          name: reproducibility-report
          path: output/reproducibility/reproducibility-report.md

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-lint
      - security-scan
      - migration-check
      - frontend-build
      - e2e-critical-journey
      - dast-scan
      - reproducibility-report

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (multi-stage)
        run: docker build -t chaticu-api:ci backend/

      - name: Verify image runs
        run: |
          docker run -d --name chaticu-test \
            -e DATABASE_URL="sqlite+aiosqlite:///./test.db" \
            -e JWT_SECRET="ci-test-secret-do-not-use-in-production" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e DEBUG="true" \
            chaticu-api:ci
          sleep 3
          docker logs chaticu-test
          docker stop chaticu-test

      - name: Verify image size
        run: docker images chaticu-api:ci --format "{{.Size}}"
