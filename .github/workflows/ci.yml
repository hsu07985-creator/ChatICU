name: ChatICU CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies (locked)
        run: pip install -r requirements.lock

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m pytest tests/ -v --tb=short

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies
        run: pip install -r requirements.lock flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Display bandit results
        run: bandit -r app/ -c pyproject.toml --severity-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  migration-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Verify Alembic migrations apply cleanly
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./migration_test.db"
          JWT_SECRET: "ci-test-secret"
          SEED_DEFAULT_PASSWORD: "CITestPassword123!"
        run: python -m alembic upgrade head

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, migration-check, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (multi-stage)
        run: docker build -t chaticu-api:ci backend/

      - name: Verify image runs
        run: |
          docker run -d --name chaticu-test \
            -e DATABASE_URL="sqlite+aiosqlite:///./test.db" \
            -e JWT_SECRET="ci-test-secret" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e DEBUG="true" \
            chaticu-api:ci
          sleep 3
          docker logs chaticu-test
          docker stop chaticu-test

      - name: Verify image size
        run: docker images chaticu-api:ci --format "{{.Size}}"
